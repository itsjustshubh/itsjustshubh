<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - {{Name}}</title>
    <style>
        /* Your CSS styles here */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{Name}}</h1>
            <p>{{Address}} | {{Phone}} | <a href="mailto:{{Email}}">{{Email}}</a> | <a href="{{Github}}">{{Github}}</a> | <a href="{{LinkedIn}}">{{LinkedIn}}</a> | <a href="{{Website}}">{{Website}}</a></p>
        </div>

        <div class="section education">
            <h2 class="section-title">Education</h2>
            {{EducationContent}}
        </div>

        <div class="section skills">
            <h2 class="section-title">Technical Knowledge</h2>
            {{SkillsContent}}
        </div>

        <div class="section projects">
            <h2 class="section-title">Projects</h2>
            {{ProjectsContent}}
        </div>

        <div class="section experience">
            <h2 class="section-title">Work Experience</h2>
            {{ExperienceContent}}
        </div>

        <div class="section extracurricular">
            <h2 class="section-title">Extracurricular Involvement</h2>
            {{ExtracurricularContent}}
        </div>
    </div>
</body>
</html>
