name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Bot Changes Finalised README.md') &&
           !contains(github.event.head_commit.message, 'Bot Changes Finalised resume') }}
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present

  update-readme:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !contains(github.event.head_commit.message, 'Bot Changes Finalised README.md') }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'
      - run: npm install
      - name: Bundle Update Script
        run: npm run bundle-update-script
      - name: Update README
        run: node dist/updateReadmeBundle.js
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "::set-output name=changes_exist::true"
      - name: Commit changes if any
        if: steps.git-check.outputs.changes_exist == 'true'
        run: |
          git config --local user.email "reapers-arras.0y@icloud.com"
          git config --local user.name "README Writer Bot"
          git add README.md
          git commit -m "Bot Changes Finalised README.md" -a
      - name: Fetch and Rebase
        run: |
          git fetch
          git rebase origin/main
      - name: Push changes
        run: git push

  generate-resume:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ contains(github.event.head_commit.message, 'Bot Changes Finalised README.md') &&
           !contains(github.event.head_commit.message, 'Bot Changes Finalised resume') }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'
      - run: npm install
      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive
      - name: List files in outputs directory
        run: ls -l outputs/
      - name: Generate Resume
        run: |
          node src/generateResume.js
          if [ -f outputs/resume.pdf ]; then
            echo "Resume file exists. Deleting and recreating."
            rm outputs/resume.pdf
            node src/generateResume.js
          else
            echo "Creating resume file."
            node src/generateResume.js
          fi
      - name: Commit and push resume
        run: |
          git config --local user.email "reapers-arras.0y@icloud.com"
          git config --local user.name "Resume Writer Bot"
          git add outputs/resume.pdf
          git commit -m "Bot Changes Finalised resume" -a
          git push
