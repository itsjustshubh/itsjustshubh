name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14' # specify your Node.js version
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present

  update-readme:
    runs-on: ubuntu-latest
    needs: build
    # Prevent this job from running if the last commit message is 'Auto-update README'
    if: "!contains(github.event.head_commit.message, 'Auto-update README')"
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'
      - run: npm install
      - name: Bundle Update Script
        run: npm run bundle-update-script
      - name: Update README
        run: node dist/updateReadmeBundle.js
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "::set-output name=changes_exist::true"
      - name: Commit and push if README changed
        if: steps.git-check.outputs.changes_exist == 'true'
        run: |
          git config --local user.email "reapers-arras.0y@icloud.com"
          git config --local user.name "Automated Updater"
          git add README.md
          git commit -m "Auto-update README" -a
          git push
