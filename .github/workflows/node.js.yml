name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present

  update-readme:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14' # Use the Node.js version that matches your environment
      - run: npm install
      - name: Bundle Update Script
        run: npm run bundle-update-script
      - name: Update README
        run: node dist/updateReadmeBundle.js
      - name: Commit and push if README changed
        run: |
          git config --local user.email "reapers-arras.0y@icloud.com"
          git config --local user.name "Automated Updater"
          git add README.md
          git commit -m "Update README" -a || exit 0
          git push
